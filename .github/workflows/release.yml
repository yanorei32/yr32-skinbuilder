name: release

on:
  push:
    branches:
      - "master"
    tags:
      - "v*"

jobs:
  build:
    name: build
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v7.0.0

      - name: Install inkscape and ffmpeg
        run: |
          sudo add-apt-repository -y ppa:inkscape.dev/stable
          sudo apt-get -y update
          sudo apt-get install -y inkscape ffmpeg

      - name: build-dot
        run: |
          STYLE=dot ./build.sh

      - name: build-number
        run: |
          STYLE=number ./build.sh

      - name: pre-release
        uses: softprops/action-gh-release@v3.0.2
        if: "! startsWith(github.ref, 'refs/tags/')"
        with:
          tag_name: "latest"
          prerelease: true
          name: "Development Build"
          files: "*.osk"

      - name: tagged-release
        uses: softprops/action-gh-release@v3.0.2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          prerelease: false
          files: "*.osk"
